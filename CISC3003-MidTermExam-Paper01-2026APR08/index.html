<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dc228114 - Kris Wu</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container" id="container">
        
        <!-- Sign Up 表单（左侧，初始显示） -->
        <div class="form-container sign-up-container">
            <form action="#">
                <h1>Join Us</h1>
                <div class="social-container">
                    <a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social"><i class="fab fa-google-plus-g"></i></a>
                    <a href="#" class="social"><i class="fab fa-linkedin-in"></i></a>
                </div>
                <span>Use your email to sign up</span>
                <input type="text" placeholder="Full Name" required />
                <input type="email" placeholder="Email" required />
                <input type="password" placeholder="Create Password" required />
                <button type="button" class="btn-primary">REGISTER</button>
            </form>
        </div>

        <!-- Sign In 表单（右侧，初始隐藏） -->
        <div class="form-container sign-in-container">
            <form action="#">
                <h1>Sign In</h1>
                <div class="social-container">
                    <a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social"><i class="fab fa-google-plus-g"></i></a>
                    <a href="#" class="social"><i class="fab fa-linkedin-in"></i></a>
                </div>
                <span>Log in to stay connected with us</span>
                <input type="email" placeholder="Email" required />
                <input type="password" placeholder="Password" required />
                <button type="button" class="btn-primary">SIGN IN</button>
            </form>
        </div>

        <!-- 遮罩层 -->
        <div class="overlay-container">
            <div class="overlay">
                <!-- 左侧面板：显示 "Hello, Again!" -->
                <div class="overlay-panel overlay-left">
                    <h1>Hello, Again!</h1>
                    <div class="image-box">
                        <img src="images/login.png" alt="Login">
                    </div>
                    <p>Log in to stay connected with us</p>
                    <button type="button" class="ghost-btn" id="signIn">SIGN IN</button>
                </div>
                
                <!-- 右侧面板：显示 "Hello, Friend!" -->
                <div class="overlay-panel overlay-right">
                    <h1>Hello, Friend!</h1>
                    <div class="image-box">
                        <img src="images/register.png" alt="Register">
                    </div>
                    <p>Enter your personal details and start journey with us</p>
                    <button type="button" class="ghost-btn" id="signUp">SIGN UP</button>
                </div>
            </div>
        </div>

    </div>

    <footer>
        <p>CISC3003 Web Programming: dc228114 Kris Wu 2026</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
